---
- hosts: localhost
  gather_facts: False
  tasks:
    - name: Verify all environment variables are accessible via ansible_env
      assert:
        that:
          - ansible_env.TEST_PULL_BASIC_VAR is defined
          - ansible_env.TEST_PULL_BASIC_VAR == "pull_test_value"
          - ansible_env.TEST_PULL_FILE_VAR is defined
          - ansible_env.TEST_PULL_FILE_VAR == "pull_file_value" 
          - ansible_env.TEST_PULL_JSON_VAR is defined
          - ansible_env.TEST_PULL_JSON_VAR == "pull_json_value"
        fail_msg: "Environment variables not accessible via -E option in ansible-pull"
